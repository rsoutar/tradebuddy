services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      TRADING_BOT_API_HOST: 0.0.0.0
      TRADING_BOT_API_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - trading_bot_data:/app/.data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
      VITE_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  trading_bot_data:
